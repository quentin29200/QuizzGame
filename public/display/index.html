<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizzGame — Display</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #0f0f1a;
      --surf:  #16192a;
      --muted: #3a3d5a;
      --text:  #eaeaea;
      --ca-bg:#1a2a4a; --ca:#85b7eb;
      --cb-bg:#1a3a2a; --cb:#5dcaa5;
      --cc-bg:#3a2a1a; --cc:#ef9f27;
      --cd-bg:#2a1a2a; --cd:#ed93b1;
      --gold: #ffd166;
      --font: 'Segoe UI', system-ui, sans-serif;
      --toggle-bg: rgba(255,255,255,.08);
      --toggle-color: rgba(255,255,255,.35);
    }
    body.light-mode {
      --bg:    #f0f2f8;
      --surf:  #ffffff;
      --muted: #c0c4d8;
      --text:  #1a1a2e;
      --ca-bg:#ddeeff; --ca:#2a6db5;
      --cb-bg:#d9f5eb; --cb:#1a7a5e;
      --cc-bg:#fff0d9; --cc:#a05e00;
      --cd-bg:#f5e0ee; --cd:#9e2060;
      --gold: #c8860a;
      --toggle-bg: rgba(0,0,0,.08);
      --toggle-color: rgba(0,0,0,.4);
    }
    body.light-mode #code-corner { color: rgba(0,0,0,.15); }
    body.light-mode .lobby-hint  { color: #888; }
    body.light-mode .lobby-status { color: #aaa; }
    body.light-mode .q-mode-pill { background: rgba(0,0,0,.06); color: #999; }
    body.light-mode .q-counter   { color: #aaa; }
    body.light-mode .q-counter strong { color: #666; }
    body.light-mode .timer-ring-bg  { stroke: rgba(0,0,0,.08); }
    body.light-mode #leaderboard-col { background: rgba(0,0,0,.04); }
    body.light-mode .lb-row { background: rgba(0,0,0,.04); }
    body.light-mode .lb-row.lb-1 { background: rgba(200,134,10,.12); }
    body.light-mode .lb-row.lb-2 { background: rgba(100,100,100,.08); }
    body.light-mode .lb-row.lb-3 { background: rgba(155,97,40,.1); }
    body.light-mode .lb-title { color: #aaa; }
    body.light-mode .lb-rank  { color: #aaa; }
    body.light-mode .lb-empty { color: #bbb; }
    body.light-mode .buzz-waiting { color: #bbb; }
    body.light-mode #game-layout #question-col { border-right-color: rgba(0,0,0,.08); }
    body.light-mode #players-bar { background: rgba(240,242,248,.92); border-top-color: rgba(0,0,0,.06); }
    body.light-mode .p-chip { background: rgba(0,0,0,.06); }
    body.light-mode .vbar-wrap { background: rgba(0,0,0,.08); }
    body.light-mode .final-row { background: rgba(0,0,0,.04); }
    body.light-mode .final-rank { color: #aaa; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .hidden { display: none !important; }

    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes winnerIn { 0%{transform:scale(0) rotate(-6deg);opacity:0} 70%{transform:scale(1.05) rotate(1deg)} 100%{transform:scale(1);opacity:1} }
    @keyframes slideIn  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    /* ══ CODE CORNER ══ */
    #code-corner {
      position: fixed; top: 1rem; left: 1.5rem;
      font-family: monospace; font-size: .95rem; font-weight: 700;
      color: rgba(255,255,255,.12); letter-spacing: .1em; z-index: 20;
    }

    /* ══ LOBBY ══ */
    #lobby {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2rem; text-align: center; padding: 2rem;
    }
    .lobby-title { font-size: 3.5rem; font-weight: 900; }
    .lobby-title span { color: #e94560; }
    .lobby-code {
      font-size: 7rem; font-weight: 900; letter-spacing: .3em;
      color: #e94560; font-family: monospace;
      text-shadow: 0 0 60px rgba(233,69,96,.3);
    }
    .lobby-hint   { color: #666; font-size: 1.2rem; }
    .lobby-status { color: #333; font-size: 1rem; animation: pulse 1.5s ease-in-out infinite; }

    /* ══ GAME LAYOUT ══ */
    #game-layout {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ─ Question column ─ */
    #question-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 2.5rem 4rem; gap: 2.5rem;
      border-right: 1px solid rgba(255,255,255,.05);
    }

    .q-meta {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 900px;
    }
    .q-mode-pill {
      padding: .3rem .9rem; border-radius: 999px; font-size: .8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      background: rgba(255,255,255,.06); color: #555;
    }
    .q-counter { font-size: .9rem; color: #444; }
    .q-counter strong { color: #888; font-size: 1rem; }

    /* ── Timer ring ── */
    .timer-wrap {
      position: relative; width: 72px; height: 72px; flex-shrink: 0;
    }
    .timer-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .timer-ring-bg   { fill: none; stroke: rgba(255,255,255,.08); stroke-width: 3; }
    .timer-ring-fill {
      fill: none; stroke: #06b489; stroke-width: 3; stroke-linecap: round;
      stroke-dasharray: 100; stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke .5s;
    }
    .timer-num {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; font-weight: 900; color: #06b489; transition: color .5s;
    }

    #question-text {
      font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 700;
      text-align: center; line-height: 1.35;
      width: 100%; max-width: 900px;
      animation: fadeUp .4s ease;
    }

    /* Choices (shown only after reveal) */
    #choices-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem; width: 100%; max-width: 900px;
    }
    .choice-card {
      border-radius: 14px; border: 2px solid transparent;
      padding: 1.2rem 1.5rem; font-size: clamp(.95rem, 1.8vw, 1.3rem); font-weight: 600;
      display: flex; align-items: center; gap: .9rem;
      animation: slideIn .3s ease both;
      transition: filter .3s, opacity .3s;
    }
    .choice-card.ca { background: var(--ca-bg); border-color: var(--ca); color: var(--ca); }
    .choice-card.cb { background: var(--cb-bg); border-color: var(--cb); color: var(--cb); }
    .choice-card.cc { background: var(--cc-bg); border-color: var(--cc); color: var(--cc); }
    .choice-card.cd { background: var(--cd-bg); border-color: var(--cd); color: var(--cd); }
    .choice-card.correct { filter: brightness(1.4); box-shadow: 0 0 28px currentColor; }
    .choice-card.wrong   { opacity: .2; filter: grayscale(.6); }

    .choice-letter {
      width: 2.4rem; height: 2.4rem; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem; font-weight: 900; background: currentColor;
    }
    .choice-letter span { mix-blend-mode: multiply; filter: invert(1); color: #000; }
    .choice-content { flex: 1; }
    .choice-label { line-height: 1.3; }
    .vbar-wrap { margin-top: .45rem; height: 5px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; }
    .vbar-fill { height: 100%; background: currentColor; border-radius: 3px; transition: width .5s ease; }

    /* ─ Leaderboard column ─ */
    #leaderboard-col {
      width: 280px; flex-shrink: 0;
      display: flex; flex-direction: column;
      padding: 1.5rem 1rem 4rem; gap: 1rem;
      background: rgba(0,0,0,.25); overflow-y: auto;
    }
    .lb-title {
      font-size: .68rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .15em; color: #444;
    }
    .lb-list { display: flex; flex-direction: column; gap: .45rem; }

    .lb-row {
      display: flex; align-items: center; gap: .6rem;
      padding: .55rem .75rem; border-radius: 10px;
      background: rgba(255,255,255,.03);
      transition: background .4s;
    }
    .lb-row.lb-1 { background: rgba(255,209,102,.1); }
    .lb-row.lb-2 { background: rgba(210,210,210,.06); }
    .lb-row.lb-3 { background: rgba(205,127,50,.07); }

    .lb-rank { font-size: .75rem; font-weight: 800; color: #444; min-width: 1.6rem; text-align: center; }
    .lb-row.lb-1 .lb-rank { color: var(--gold); }
    .lb-row.lb-2 .lb-rank { color: #aaa; }
    .lb-row.lb-3 .lb-rank { color: #cd7f32; }

    .lb-name  { flex: 1; font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-score { font-size: 1.05rem; font-weight: 900; color: var(--gold); }
    .lb-empty { color: #333; font-size: .83rem; }

    /* ══ BUZZER SCREEN ══ */
    #buzzer-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2rem; padding: 3rem; text-align: center;
    }
    .buzz-label {
      font-size: .8rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .2em; color: #444;
    }
    #buzz-question-text {
      font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 700;
      max-width: 820px; line-height: 1.35;
      animation: fadeUp .4s ease;
    }
    #winner-display {
      font-size: clamp(4.5rem, 12vw, 9rem); font-weight: 900;
      color: var(--gold); line-height: 1;
      text-shadow: 0 0 80px rgba(255,209,102,.45);
      animation: winnerIn .5s cubic-bezier(.175,.885,.32,1.275);
    }
    .buzz-waiting { color: #333; font-size: 1.1rem; animation: pulse 1.5s ease-in-out infinite; }

    /* ══ FINAL SCREEN ══ */
    #final-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2.5rem 3rem 5rem; gap: 2rem; overflow: hidden;
    }
    .final-title {
      font-size: clamp(1.6rem, 3.5vw, 2.8rem); font-weight: 900;
      text-transform: uppercase; letter-spacing: .2em;
      color: var(--gold); text-shadow: 0 0 40px rgba(255,209,102,.35);
      animation: fadeUp .5s ease;
    }
    .final-podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 1.5rem; width: 100%; max-width: 860px;
    }
    .podium-slot {
      display: flex; flex-direction: column; align-items: center; gap: .4rem;
      animation: fadeUp .5s ease both;
    }
    .podium-slot:nth-child(1) { animation-delay: .1s; }
    .podium-slot:nth-child(2) { animation-delay: 0s;  }
    .podium-slot:nth-child(3) { animation-delay: .2s; }
    .podium-medal { font-size: clamp(2rem, 4vw, 3rem); }
    .podium-name  {
      font-size: clamp(1.1rem, 2.5vw, 1.9rem); font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
    }
    .podium-score { font-size: clamp(.85rem, 1.6vw, 1.2rem); color: var(--gold); font-weight: 700; }
    .podium-bar {
      width: clamp(100px, 18vw, 200px); border-radius: 10px 10px 0 0;
      background: rgba(255,255,255,.06);
    }
    .podium-bar-1 { height: 120px; background: rgba(255,209,102,.25); border: 2px solid var(--gold); }
    .podium-bar-2 { height: 80px;  background: rgba(200,200,200,.12); border: 2px solid #aaa; }
    .podium-bar-3 { height: 55px;  background: rgba(205,127,50,.18);  border: 2px solid #cd7f32; }
    .podium-first .podium-name { color: var(--gold); }

    .final-rest-list {
      display: flex; flex-direction: column; gap: .4rem;
      width: 100%; max-width: 500px;
    }
    .final-row {
      display: flex; align-items: center; gap: .75rem;
      padding: .45rem .9rem; border-radius: 10px;
      background: rgba(255,255,255,.04);
      animation: fadeUp .4s ease both;
    }
    .final-rank  { font-size: .8rem; font-weight: 800; color: #555; min-width: 1.6rem; text-align: center; }
    .final-name  { flex: 1; font-size: .95rem; font-weight: 600; }
    .final-score { font-size: .95rem; font-weight: 800; color: var(--gold); }

    /* ══ QR CODE ══ */
    #qr-wrap {
      display: flex; flex-direction: column; align-items: center; gap: .6rem;
    }
    #qr-code {
      padding: .6rem; border-radius: 12px;
      background: #fff;          /* toujours blanc pour la lisibilité du QR */
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
      line-height: 0;            /* évite l'espace sous le canvas */
    }
    #qr-code canvas, #qr-code img { display: block; border-radius: 6px; }
    #qr-hint {
      font-size: .8rem; color: #555; letter-spacing: .05em;
    }
    body.light-mode #qr-hint { color: #999; }

    /* ══ THEME TOGGLE ══ */
    #theme-toggle {
      position: fixed; top: 1rem; right: 1.5rem; z-index: 30;
      background: var(--toggle-bg); color: var(--toggle-color);
      border: none; border-radius: 999px;
      width: 2.2rem; height: 2.2rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s, color .2s, transform .15s;
      font-size: 1rem; line-height: 1;
    }
    #theme-toggle:hover {
      background: rgba(128,128,128,.18);
      color: var(--text);
      transform: scale(1.1);
    }

    /* ══ PLAYERS BAR ══ */
    #players-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(8,8,18,.9); backdrop-filter: blur(10px);
      padding: .4rem 1.5rem; display: flex; gap: .5rem;
      flex-wrap: wrap; justify-content: center;
      border-top: 1px solid rgba(255,255,255,.04); min-height: 38px;
    }
    .p-chip {
      background: rgba(255,255,255,.05); border-radius: 999px;
      padding: .18rem .65rem; font-size: .76rem;
      display: flex; align-items: center; gap: .35rem;
    }
    .p-chip-score { color: var(--gold); font-weight: 700; }
  </style>
</head>
<body>

  <div id="code-corner"></div>

  <!-- ══ THEME TOGGLE ══ -->
  <button id="theme-toggle" title="Basculer dark/light mode">🌙</button>

  <!-- ══ LOBBY ══ -->
  <div id="lobby">
    <div class="lobby-title">Quizz<span>Game</span></div>
    <div>
      <div class="lobby-hint" style="margin-bottom:.6rem">Rejoignez sur votre mobile</div>
      <div class="lobby-code" id="display-code">——</div>
      <div class="lobby-hint" style="margin-top:.6rem">→ /play</div>
    </div>
    <div id="qr-wrap" class="hidden">
      <div id="qr-code"></div>
      <div id="qr-hint">Scanner pour rejoindre</div>
    </div>
    <div class="lobby-status" id="lobby-status">Aucun joueur connecté</div>
  </div>

  <!-- ══ GAME LAYOUT ══ -->
  <div id="game-layout" class="hidden">

    <!-- Question + choices (after reveal) -->
    <div id="question-col">
      <div class="q-meta">
        <span class="q-mode-pill" id="q-mode-label">Question</span>
        <!-- Timer ring (normal questions) -->
        <div id="display-timer" class="timer-wrap hidden">
          <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
            <circle class="timer-ring-bg"   cx="18" cy="18" r="15.9"/>
            <circle class="timer-ring-fill" cx="18" cy="18" r="15.9" id="timer-ring"/>
          </svg>
          <span class="timer-num" id="timer-num"></span>
        </div>
        <span class="q-counter">
          <strong id="vote-count">0</strong> / <span id="vote-total">0</span> réponses
        </span>
      </div>
      <div id="question-text"></div>
      <div id="choices-grid"></div>
    </div>

    <!-- Leaderboard -->
    <div id="leaderboard-col">
      <div class="lb-title">Classement</div>
      <div class="lb-list" id="lb-list">
        <div class="lb-empty">En attente de joueurs…</div>
      </div>
    </div>
  </div>

  <!-- ══ BUZZER ══ -->
  <div id="buzzer-screen" class="hidden">
    <div class="buzz-label" id="buzz-label">Mode Buzzer</div>
    <div id="buzz-question-text"></div>
    <!-- Timer ring (buzzer) -->
    <div id="display-timer-buzz" class="timer-wrap hidden" style="width:80px;height:80px">
      <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <circle class="timer-ring-bg"   cx="18" cy="18" r="15.9"/>
        <circle class="timer-ring-fill" cx="18" cy="18" r="15.9" id="timer-ring-buzz"/>
      </svg>
      <span class="timer-num" id="timer-num-buzz" style="font-size:1.4rem"></span>
    </div>
    <div id="winner-display" class="hidden"></div>
    <div class="buzz-waiting" id="buzz-waiting">Prêts ? À vos buzzers !</div>
    <div id="buzzer-answer-reveal" class="hidden" style="
      margin-top:1rem; padding:1rem 2rem; border-radius:14px;
      background:rgba(6,180,137,.15); border:2px solid #06b489;
      font-size:clamp(1.4rem,3vw,2.2rem); font-weight:800; color:#06b489;
      animation:fadeUp .4s ease;
    "></div>
  </div>

  <!-- ══ FINAL SCREEN ══ -->
  <div id="final-screen" class="hidden">
    <div class="final-title">Classement Final</div>
    <div class="final-podium" id="final-podium"></div>
    <div class="final-rest-list" id="final-rest"></div>
  </div>

  <!-- ══ PLAYERS BAR ══ -->
  <div id="players-bar"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/display/display.js?v=3"></script>
  <script>
    (function () {
      const btn = document.getElementById('theme-toggle');
      const STORAGE_KEY = 'display-theme';

      function applyTheme(theme) {
        if (theme === 'light') {
          document.body.classList.add('light-mode');
          btn.textContent = '☀️';
          btn.title = 'Passer en mode sombre';
        } else {
          document.body.classList.remove('light-mode');
          btn.textContent = '🌙';
          btn.title = 'Passer en mode clair';
        }
      }

      // Restaurer la préférence sauvegardée (dark par défaut)
      const saved = localStorage.getItem(STORAGE_KEY) || 'dark';
      applyTheme(saved);

      btn.addEventListener('click', function () {
        const isLight = document.body.classList.contains('light-mode');
        const next = isLight ? 'dark' : 'light';
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
      });
    })();
  </script>
</body>
</html>
